<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>نظام GOO • الواجهة الذكية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --primary: #0062cc;
            --primary-light: #1a8cff;
            --primary-dark: #004a9e;
            --accent: #00c896;
            --bg: #dde6f0;
            --surface: #ffffff;
            --surface2: #f4f8fd;
            --border: #e2ecf7;
            --text-main: #0a2540;
            --text-sec: #4a6a8a;
            --text-muted: #8aaac8;
            --shadow-sm: 0 2px 12px rgba(0, 98, 204, 0.07);
            --shadow-md: 0 6px 24px rgba(0, 98, 204, 0.12);
            --radius-sm: 14px;
            --radius-md: 22px;
            --radius-lg: 32px;
            --danger: #e03c3c;
            --success: #00a87a;
            --warning: #e07000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .app-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
            padding: 20px;
            color: white;
            text-align: center;
            position: relative;
            box-shadow: var(--shadow-md);
        }

        .app-header h1 { font-size: 1.5rem; font-weight: 800; }
        .app-header p { font-size: 0.9rem; opacity: 0.9; }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 15px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-md);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 700; font-size: 0.85rem; color: var(--text-sec); }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--primary); background: var(--surface2); }
        
        textarea { height: 150px; font-family: monospace; direction: ltr; }
        .json-area { height: 100px; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 0.85rem;
        }

        .btn-save { background: var(--primary); color: white; }
        .btn-upload { background: var(--success); color: white; display: none; }
        .btn-preview { background: var(--secondary); color: var(--text-main); border: 1px solid var(--border); }
        .btn-config { background: var(--warning); color: white; }
        .btn-clear { background: var(--text-muted); color: white; }

        button:active { transform: scale(0.98); }

        .file-list { max-height: 500px; overflow-y: auto; }
        .file-item {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface2);
        }
        .file-item:hover { border-color: var(--primary); background: white; }
        .file-item.active { border-color: var(--primary); background: #e8f0ff; border-width: 2px; }
        .file-name { font-weight: 700; color: var(--text-main); display: block; font-size: 0.85rem; }
        .file-date { font-size: 0.7rem; color: var(--text-muted); }

        .status-box {
            padding: 12px;
            border-radius: var(--radius-sm);
            margin-top: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
            text-align: center;
        }
        .status-success { background: #e6faf4; color: #00a87a; border: 1px solid #b3f0d8; }
        .status-error { background: #fff0f0; color: #e03c3c; border: 1px solid #f9d5d5; }

        .preview-container { margin-top: 20px; }
        iframe { width: 100%; height: 600px; border: 2px solid var(--border); border-radius: var(--radius-md); background: white; }

        .config-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: var(--radius-md);
            width: 90%;
            max-width: 500px;
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 900px) {
            .main-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <h1>نظام GOO • الواجهة الذكية</h1>
        <p>إدارة ورفع المحتوى التعليمي إلى GitHub</p>
    </header>

    <div class="main-content">
        <div class="editor-section">
            <div class="card">
                <div class="card-title"><i class="fas fa-edit"></i> محرر البيانات</div>
                <div class="form-group">
                    <label>اسم الملف:</label>
                    <input type="text" id="fileName" placeholder="مثال: سجل الأنشطة">
                </div>
                <div class="form-group">
                    <label>رفع ملف HTML:</label>
                    <div style="display:flex; gap:10px;">
                        <input type="file" id="htmlFileInput" accept=".html" style="display:none;">
                        <button onclick="document.getElementById('htmlFileInput').click()" style="background:var(--surface2); color:var(--primary); border:2px dashed var(--primary); flex:1;">
                            <i class="fas fa-file-upload"></i> اختر ملف HTML من جهازك
                        </button>
                    </div>
                    <div id="fileStatus" style="font-size:0.75rem; color:var(--success); margin-top:5px; display:none;"></div>
                    <textarea id="htmlCode" style="display:none;"></textarea>
                </div>
                <div class="form-group">
                    <label>بيانات JSON:</label>
                    <textarea id="jsonCode" class="json-area" placeholder='{"key": "value"}'></textarea>
                </div>
                <div class="btn-group">
                    <button class="btn-save" id="saveBtn"><i class="fas fa-save"></i> حفظ محلي</button>
                    <button class="btn-upload" id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i> الرفع لـ GitHub</button>
                    <button class="btn-preview" id="previewBtn"><i class="fas fa-eye"></i> معاينة</button>
                    <button class="btn-config" id="configBtn"><i class="fas fa-cog"></i> الإعدادات</button>
                    <button class="btn-clear" id="clearBtn"><i class="fas fa-trash"></i> مسح</button>
                </div>
                <div id="statusBox" class="status-box"></div>
            </div>

            <div class="card preview-container">
                <div class="card-title"><i class="fas fa-desktop"></i> المعاينة المباشرة</div>
                <iframe id="previewFrame"></iframe>
            </div>
        </div>

        <div class="sidebar">
            <div class="card">
                <div class="card-title"><i class="fas fa-database"></i> قاعدة البيانات</div>
                <div class="form-group">
                    <input type="text" id="searchFiles" placeholder="بحث في الملفات...">
                </div>
                <div class="file-list" id="fileList">
                    <!-- القائمة ستظهر هنا -->
                </div>
            </div>
        </div>
    </div>

    <div class="config-modal" id="configModal">
        <div class="modal-content">
            <div class="card-title"><i class="fas fa-cog"></i> إعدادات GitHub</div>
            <div class="form-group">
                <label>GitHub Token:</label>
                <input type="password" id="ghToken">
            </div>
            <div class="form-group">
                <label>اسم المستخدم:</label>
                <input type="text" id="ghUser">
            </div>
            <div class="form-group">
                <label>اسم المستودع:</label>
                <input type="text" id="ghRepo">
            </div>
            <div class="form-group">
                <label>المجلد:</label>
                <input type="text" id="ghFolder">
            </div>
            <button class="btn-save" onclick="saveConfig()" style="width:100%">حفظ الإعدادات</button>
        </div>
    </div>

    <script>
        const DEFAULT_CONFIG = {
            token: '',
            user: 'fa78383012736al-a11y',
            repo: 'goo',
            folder: 'database',
            branch: 'main'
        };

        const storage = {
            getFiles: () => JSON.parse(localStorage.getItem('goo_files') || '{}'),
            saveFiles: (files) => localStorage.setItem('goo_files', JSON.stringify(files)),
            getConfig: () => JSON.parse(localStorage.getItem('goo_config')) || DEFAULT_CONFIG,
            saveConfig: (cfg) => localStorage.setItem('goo_config', JSON.stringify(cfg))
        };

        let activeFile = null;

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            box.textContent = msg;
            box.className = `status-box status-${type}`;
            box.style.display = 'block';
            setTimeout(() => box.style.display = 'none', 5000);
        }

        function renderFileList() {
            const files = storage.getFiles();
            const search = document.getElementById('searchFiles').value.toLowerCase();
            const list = document.getElementById('fileList');
            list.innerHTML = '';

            Object.keys(files).forEach(name => {
                if (name.toLowerCase().includes(search)) {
                    const item = document.createElement('div');
                    item.className = `file-item ${activeFile === name ? 'active' : ''}`;
                    item.innerHTML = `
                        <span class="file-name">${name}</span>
                        <span class="file-date">${new Date(files[name].updatedAt).toLocaleString('ar-EG')}</span>
                    `;
                    item.onclick = () => loadFile(name);
                    list.appendChild(item);
                }
            });
        }

        function loadFile(name) {
            const file = storage.getFiles()[name];
            activeFile = name;
            document.getElementById('fileName').value = name;
            document.getElementById('htmlCode').value = file.html;
            document.getElementById('jsonCode').value = file.json;
            document.getElementById('uploadBtn').style.display = 'flex';
            document.getElementById('fileStatus').textContent = "تم تحميل الملف المخزن: " + name;
            document.getElementById('fileStatus').style.display = 'block';
            renderFileList();
            updatePreview();
        }

        document.getElementById('htmlFileInput').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('htmlCode').value = e.target.result;
                document.getElementById('fileStatus').textContent = "تم اختيار الملف: " + file.name;
                document.getElementById('fileStatus').style.display = 'block';
                if (!document.getElementById('fileName').value) {
                    document.getElementById('fileName').value = file.name.replace('.html', '');
                }
                updatePreview();
            };
            reader.readAsText(file);
        };

        function updatePreview() {
            const html = document.getElementById('htmlCode').value;
            const json = document.getElementById('jsonCode').value;
            const iframe = document.getElementById('previewFrame');
            iframe.srcdoc = html;
            iframe.onload = () => {
                try {
                    const data = JSON.parse(json);
                    iframe.contentWindow.postMessage({ type: 'UPDATE_DATA', data }, '*');
                } catch(e) {}
            };
        }

        document.getElementById('saveBtn').onclick = () => {
            const name = document.getElementById('fileName').value.trim();
            if (!name) return showStatus('يرجى إدخال اسم الملف', 'error');
            const files = storage.getFiles();
            files[name] = {
                html: document.getElementById('htmlCode').value,
                json: document.getElementById('jsonCode').value,
                updatedAt: new Date().toISOString()
            };
            storage.saveFiles(files);
            activeFile = name;
            document.getElementById('uploadBtn').style.display = 'flex';
            renderFileList();
            showStatus('تم الحفظ محلياً بنجاح', 'success');
        };

        document.getElementById('configBtn').onclick = () => {
            const cfg = storage.getConfig();
            document.getElementById('ghToken').value = cfg.token;
            document.getElementById('ghUser').value = cfg.user;
            document.getElementById('ghRepo').value = cfg.repo;
            document.getElementById('ghFolder').value = cfg.folder;
            document.getElementById('configModal').style.display = 'flex';
        };

        window.saveConfig = () => {
            storage.saveConfig({
                token: document.getElementById('ghToken').value,
                user: document.getElementById('ghUser').value,
                repo: document.getElementById('ghRepo').value,
                folder: document.getElementById('ghFolder').value,
                branch: 'main'
            });
            document.getElementById('configModal').style.display = 'none';
            showStatus('تم حفظ الإعدادات', 'success');
        };

        document.getElementById('uploadBtn').onclick = async () => {
            const name = document.getElementById('fileName').value;
            const slug = name.replace(/\s+/g, '-').toLowerCase();
            const cfg = storage.getConfig();
            const btn = document.getElementById('uploadBtn');

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الرفع...';
                
                const upload = async (path, content) => {
                    const url = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`;
                    const getRes = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}` } });
                    const existing = getRes.status === 200 ? await getRes.json() : null;
                    
                    const body = {
                        message: `Update ${path}`,
                        content: btoa(unescape(encodeURIComponent(content))),
                        branch: cfg.branch
                    };
                    if (existing) body.sha = existing.sha;

                    const res = await fetch(url, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${cfg.token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) throw new Error('فشل الرفع');
                };

                await upload(`${cfg.folder}/${slug}.html`, document.getElementById('htmlCode').value);
                await upload(`${cfg.folder}/${slug}.json`, document.getElementById('jsonCode').value);
                
                showStatus('تم الرفع إلى GitHub بنجاح!', 'success');
            } catch (e) {
                showStatus('خطأ في الرفع: ' + e.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> الرفع لـ GitHub';
            }
        };

        document.getElementById('previewBtn').onclick = updatePreview;
        document.getElementById('searchFiles').oninput = renderFileList;
        document.getElementById('clearBtn').onclick = () => location.reload();

        renderFileList();
    </script>
</body>
</html>
