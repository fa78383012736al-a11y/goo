name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install Cordova
        run: npm install -g cordova
      - name: Build APK
        run: |
          cordova create build_app com.goo.app GooApp
          cd build_app
          cordova platform add android
          cp -r ../* www/ || true
          # Enable Live Update
          sed -i 's/<content src="index.html" \/>/<content src="https:\/\/fa78383012736al-a11y.github.io\/goo\/" \/>/g' config.xml
          cordova build android --debug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GooApp-Cordova
          path: build_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
