name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "GooApp" "com.goo.app" --web-dir .
          cat <<EOC > capacitor.config.json
          {
            "appId": "com.goo.app",
            "appName": "GooApp",
            "webDir": ".",
            "server": { "url": "https://fa78383012736al-a11y.github.io/goo/", "cleartext": true }
          }
          EOC
          npx cap add android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: GooApp-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
