    // دالة نسخ رسالة الطلب
    function copyRequestMessage() {
        navigator.clipboard.writeText(requestMessage).then(() => {
            const btn = document.getElementById('copyRequestBtn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> تم النسخ';
            btn.style.background = '#16a34a';
            setTimeout(() => {
                btn.innerHTML = originalHTML;
                btn.style.background = '#d97706';
            }, 2000);
        }).catch(() => {
            alert('تعذر نسخ النص، يرجى نسخه يدوياً');
        });
    }

    document.getElementById('copyRequestBtn').addEventListener('click', copyRequestMessage);

    function buildReport(data) {

    function createPageWithHeader() {
        const page = document.createElement('div');
        page.className = 'page';
        const headerDiv = document.createElement('div');
        headerDiv.className = 'global-header-display';
        page.appendChild(headerDiv);
        return page;
    }

    function escapeHTML(str) {
        return String(str).replace(/[&<>"]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            return m;
        });
    }

    window.uploadGlobalHeader = function(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const imgUrl = e.target.result;
            const displays = document.querySelectorAll('.global-header-display');
            displays.forEach(div => {
                div.style.display = 'block';
                div.innerHTML = `<img src="${imgUrl}" alt="Header">`;
            });
            document.getElementById('global-prompt').innerText = "تم تحديث الترويسة";
        };
        reader.readAsDataURL(file);
    };

    window.previewLocalImage = function(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        const uploader = input.parentElement;
        const img = uploader.querySelector('img');
        const prompt = uploader.querySelector('.upload-prompt');
        reader.onload = function(e) {
            img.src = e.target.result;
            img.style.display = 'block';
            if (prompt) prompt.style.display = 'none';
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('applyBtn').addEventListener('click', () => {
        try {
            const raw = jsonArea.value.trim();
            if (!raw) return;
            const data = JSON.parse(raw);
            buildReport(data);
            jsonArea.value = JSON.stringify(data, null, 2);
        } catch (e) {
            alert('❌ خطأ في JSON: ' + e.message);
        }
    });

    document.getElementById('loadDefaultBtn').addEventListener('click', () => {
        jsonArea.value = JSON.stringify(DEFAULT_JSON, null, 2);
        buildReport(DEFAULT_JSON);
    });

    window.addEventListener('DOMContentLoaded', () => {
        jsonArea.value = JSON.stringify(DEFAULT_JSON, null, 2);
        buildReport(DEFAULT_JSON);
    });
