<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-logos {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .header-logos img {
            height: 60px;
            border-radius: 10px;
            background: white;
            padding: 5px;
        }

        .header-title {
            text-align: center;
            flex: 1;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .content {
            padding: 40px;
            min-height: 500px;
        }

        /* Screens */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Menu */
        .main-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .round-btn {
            padding: 40px 20px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .round-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .round-btn.round-1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .round-btn.round-2 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .round-btn.round-3 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .round-btn.round-4 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        /* Round 1 - Paper Exam */
        .paper-exam {
            text-align: center;
            padding: 60px 20px;
        }

        .timer-large {
            font-size: 80px;
            font-weight: bold;
            color: #667eea;
            margin: 40px 0;
            font-family: 'Courier New', monospace;
        }

        .exam-message {
            font-size: 24px;
            color: #333;
            margin: 40px 0;
            line-height: 1.8;
        }

        /* Subject Selection */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .subject-btn {
            padding: 30px 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .subject-btn:hover {
            transform: scale(1.05);
        }

        .subject-btn.chemistry {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .subject-btn.physics {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        .subject-btn.math {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        .subject-btn.biology {
            background: linear-gradient(135deg, #ff9a56 0%, #ff6a88 100%);
        }

        /* Number Board */
        .number-board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .number-btn {
            padding: 20px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #667eea;
        }

        .number-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: scale(1.1);
        }

        .number-btn:disabled {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
            border-color: #ccc;
            position: relative;
        }

        .number-btn:disabled::after {
            content: '✓';
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 16px;
            color: #667eea;
            font-weight: bold;
        }

        /* Question Display */
        .question-container {
            margin-top: 30px;
        }

        .timer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .timer {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
            min-width: 100px;
        }

        .timer.warning {
            color: #ff6b6b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .question-number {
            font-size: 18px;
            color: #666;
            font-weight: bold;
        }

        .question-text {
            font-size: 22px;
            color: #333;
            margin: 30px 0;
            padding: 20px;
            background: #f9f9f9;
            border-right: 4px solid #667eea;
            border-radius: 5px;
            line-height: 1.8;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .option {
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
            font-size: 16px;
            line-height: 1.6;
            text-align: right;
        }

        .option:hover:not(:disabled) {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(-5px);
        }

        .option:disabled {
            cursor: not-allowed;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .option.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }

        /* Completion Screen */
        .completion-screen {
            text-align: center;
            padding: 60px 20px;
        }

        .completion-icon {
            font-size: 100px;
            margin: 30px 0;
        }

        .completion-message {
            font-size: 32px;
            color: #333;
            margin: 20px 0;
            font-weight: bold;
        }

        .completion-text {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
        }

        .btn-restart {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .btn-restart:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        /* Back Button */
        .btn-back {
            padding: 10px 20px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: #d0d0d0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }

            .header-title {
                font-size: 20px;
            }

            .content {
                padding: 20px;
            }

            .options-grid {
                grid-template-columns: 1fr;
            }

            .timer-large {
                font-size: 60px;
            }

            .number-board {
                grid-template-columns: repeat(auto-fit, minmax(60px, 1fr));
            }
        }
    </style>
</head>

        let answeredQuestions = new Set();
        let questionTimer = null;
        let paperExamTimer = null;
        let shuffledQuestions = [];

        // Round Configuration
        const roundConfig = {
            1: { questions: 0, timePerQuestion: 1500, totalTime: 1500 },
            2: { questions: 10, timePerQuestion: 30 },
            3: { questions: 2, timePerQuestion: 20 },
            4: { questions: 1, timePerQuestion: 15 }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            MathJax.typesetPromise().catch(err => console.log(err));
        });

        // Navigation
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
            setTimeout(() => {
                MathJax.typesetPromise().catch(err => console.log(err));
            }, 100);
        }

        function startRound(round) {
            currentRound = round;
            currentQuestionIndex = 0;
            answeredQuestions.clear();

            if (round === 1) {
                showScreen('round1Screen');
                startPaperExamTimer();
            } else {
                showScreen('subjectScreen');
            }
        }

        function selectSubject(subject) {
            currentSubject = subject;
            const config = roundConfig[currentRound];
            
            // Shuffle questions for the selected subject
            let subjectQuestions = questionsData[subject] || [];
            shuffledQuestions = subjectQuestions.sort(() => Math.random() - 0.5).slice(0, config.questions);
            
            setupNumberBoard();
            showScreen('numberBoardScreen');
        }

        function setupNumberBoard() {
            const config = roundConfig[currentRound];
            const board = document.getElementById('numberBoard');
            board.innerHTML = '';

            for (let i = 1; i <= config.questions; i++) {
                const btn = document.createElement('button');
                btn.className = 'number-btn';
                btn.textContent = i;
                btn.onclick = () => selectQuestion(i - 1);
                board.appendChild(btn);
            }
        }

        function selectQuestion(index) {
            currentQuestionIndex = index;
            showQuestion();
            showScreen('questionScreen');
            startQuestionTimer();
        }

        function showQuestion() {
            const config = roundConfig[currentRound];
            const question = shuffledQuestions[currentQuestionIndex];
            const questionNum = currentQuestionIndex + 1;
            
            // Update question number
            document.getElementById('questionNumber').textContent = 
                `السؤال ${questionNum} من ${config.questions}`;

            // Display question text
            document.getElementById('questionText').textContent = question.text;

            // Generate options
            const optionsGrid = document.getElementById('optionsGrid');
            optionsGrid.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.innerHTML = option.text;
                btn.onclick = () => selectAnswer(btn, option.correct);
                optionsGrid.appendChild(btn);
            });

            // Reset timer
            const timePerQuestion = config.timePerQuestion;
            document.getElementById('questionTimer').textContent = timePerQuestion;
            
            MathJax.typesetPromise().catch(err => console.log(err));
        }

        function selectAnswer(element, isCorrect) {
            // Disable all options
            document.querySelectorAll('.option').forEach(opt => {
                opt.disabled = true;
            });

            // Show correct/incorrect
            if (isCorrect) {
                element.classList.add('correct');
            } else {
                element.classList.add('incorrect');
                // Show correct answer
                document.querySelectorAll('.option').forEach(opt => {
                    const question = shuffledQuestions[currentQuestionIndex];
                    const optIndex = Array.from(opt.parentElement.children).indexOf(opt);
                    if (question.options[optIndex].correct) {
                        opt.classList.add('correct');
                    }
                });
            }

            answeredQuestions.add(currentQuestionIndex);
            updateNumberBoard();

            // Auto move to next or completion
            setTimeout(() => {
                if (answeredQuestions.size === roundConfig[currentRound].questions) {
                    showScreen('completionScreen');
                    clearInterval(questionTimer);
                } else {
                    showScreen('numberBoardScreen');
                    clearInterval(questionTimer);
                }
            }, 2000);
        }

        function updateNumberBoard() {
            const buttons = document.querySelectorAll('.number-btn');
            buttons.forEach((btn, index) => {
                if (answeredQuestions.has(index)) {
                    btn.disabled = true;
                }
            });
        }

        function startQuestionTimer() {
            clearInterval(questionTimer);
            const config = roundConfig[currentRound];
            let timeLeft = config.timePerQuestion;
            const timerElement = document.getElementById('questionTimer');

            questionTimer = setInterval(() => {
                timeLeft--;
                timerElement.textContent = timeLeft;

                if (timeLeft <= 5) {
                    timerElement.classList.add('warning');
                } else {
                    timerElement.classList.remove('warning');
                }

                if (timeLeft <= 0) {
                    clearInterval(questionTimer);
                    // Auto-select incorrect answer
                    const options = document.querySelectorAll('.option');
                    if (options.length > 0) {
                        const randomOption = options[Math.floor(Math.random() * options.length)];
                        const question = shuffledQuestions[currentQuestionIndex];
                        const optIndex = Array.from(randomOption.parentElement.children).indexOf(randomOption);
                        selectAnswer(randomOption, question.options[optIndex].correct);
                    }
                }
            }, 1000);
        }

        function startPaperExamTimer() {
            clearInterval(paperExamTimer);
            let timeLeft = 1500; // 25 minutes
            const timerElement = document.getElementById('paperExamTimer');

            paperExamTimer = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerElement.textContent = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    clearInterval(paperExamTimer);
                    goToMainMenu();
                }
            }, 1000);
        }

        function goToNumberBoard() {
            showScreen('numberBoardScreen');
            clearInterval(questionTimer);
        }

        function goToMainMenu() {
            showScreen('mainMenu');
            clearInterval(questionTimer);
            clearInterval(paperExamTimer);
            currentRound = null;
            currentSubject = null;
        }
    </script>
