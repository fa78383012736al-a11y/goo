<!-- ابحث عن قسم الـ script في نهاية الملف وحدث الوظائف التالية -->

<script>
    // ... (ابقِ على تعريفات Firebase و appData كما هي) ...

    // تحديث وظيفة التنقل لإظهار زر الرجوع
    function navigateTo(pageId) {
        if (!pageId) return;

        // تخزين الصفحة السابقة قبل التغيير (لأغراض الرجوع)
        window.previousPage = currentPage;
        currentPage = pageId;

        document.querySelectorAll('.screen-page').forEach(p => p.classList.remove('active'));
        const targetPage = document.getElementById('page-' + pageId);
        if (targetPage) targetPage.classList.add('active');

        const screen = document.querySelector('.screen');
        if (screen) screen.scrollTop = 0;

        // إظهار زر الرجوع إذا لم نكن في الصفحة الرئيسية
        toggleBackButton(pageId !== 'home');

        if (pageId === 'home') {
            showMainNav();
        } else if (pageId === 'orders' || pageId === 'invoices') {
            showMainNav();
            if (pageId === 'orders') renderOrders();
            if (pageId === 'invoices') renderInvoices();
        } else if (pageId === 'templates') {
            showTemplatesNav();
            switchTemplateTab(currentTemplateTab, true);
        } else if (pageId === 'resources') {
            showResourcesNav();
            switchResourceTab(currentResourceTab, true);
        } else if (pageId === 'admin') {
            showAdminNav();
            switchAdminTab(currentAdminTab, true);
        }

        updateActiveNavItems();
        refreshAll();
    }

    // وظيفة الرجوع الذكية
    function goBack() {
        // إذا كان المستخدم في قسم فرعي داخل الموارد (مثل Forms أو Drive)
        if (currentPage === 'resources' && (currentResourceTab === 'forms' || currentResourceTab === 'drive' || currentResourceTab === 'locutions')) {
            switchResourceTab('wordwall'); // العودة للتبويب الأول في الموارد
        } 
        // إذا كان في أي صفحة أخرى، العودة للرئيسية
        else {
            navigateTo('home');
        }
    }

    // تحديث الهيدر في HTML ليعمل مع الوظيفة الجديدة
    // تأكد أن زر الرجوع في الهيدر ينادي goBack() بدلاً من goBackHome()
    document.getElementById('global-back-btn').onclick = goBack;

    function toggleBackButton(show) {
        const btn = document.getElementById('global-back-btn');
        if (btn) {
            btn.style.display = show ? 'flex' : 'none';
            // إضافة حركة أنيميشن خفيفة عند الظهور
            if(show) btn.style.animation = 'fadeSlide 0.3s ease';
        }
    }

    // إضافة زر رجوع سريع داخل صفحات الموارد والطلبات (اختياري لتحسين التجربة)
    function injectInternalBackButtons() {
        const pages = ['orders', 'templates', 'resources', 'invoices', 'admin'];
        pages.forEach(pId => {
            const pageEl = document.getElementById('page-' + pId);
            if (pageEl) {
                // يمكنك إضافة أزرار إضافية هنا إذا أردت
            }
        });
    }

    // استدعاء الوظيفة عند التشغيل
    window.addEventListener('DOMContentLoaded', () => {
        injectInternalBackButtons();
    });

</script>

<style>
    /* تحسين شكل زر الرجوع ليناسب التصميم الجديد */
    .back-button {
        background: rgba(255, 255, 255, 0.15) !important;
        border: 1px solid rgba(255, 255, 255, 0.4) !important;
        width: 38px !important;
        height: 38px !important;
        border-radius: 12px !important; /* شكل مربع منحني متناسق مع الأيقونات */
        margin-left: 5px;
    }
    
    .back-button i {
        font-size: 1.1rem !important;
    }

    .back-button:active {
        background: rgba(255, 255, 255, 0.3) !important;
        transform: scale(0.9);
    }
</style>
